services:
  - type: web
    name: roadhealth-ai
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn roadhealth.wsgi:application --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: roadhealth-db
          property: connectionString

databases:
  - name: roadhealth-db
    plan: free
    databaseName: roadhealth_db
